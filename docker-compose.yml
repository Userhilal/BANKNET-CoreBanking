version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: banknet_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: banknet_db
      MYSQL_USER: bank_user
      MYSQL_PASSWORD: bank_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
