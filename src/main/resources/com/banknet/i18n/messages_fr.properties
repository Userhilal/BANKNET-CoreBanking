# Chatbot
chatbot.welcome=Bonjour ! Je suis votre assistant bancaire BANKNET. Comment puis-je vous aider aujourd'hui ?
chatbot.default.response=Je ne suis pas sûr de comprendre votre question. Je peux vous aider avec : soldes et comptes, virements, objectifs d'épargne, historique, export, messagerie, notifications, et bien plus. Reformulez votre question ou contactez notre service client au 0522707008 ou BankNetMaroc@gmail.ma.
chatbot.response.solde.total=Votre solde total correspond à la somme de tous vos comptes (courant + épargne). Il est affiché en haut de votre tableau de bord dans la carte 'Solde Total'.
chatbot.response.compte.courant=Votre compte courant est votre compte principal pour les transactions quotidiennes. Son solde est visible dans la carte 'Compte Courant' sur votre tableau de bord.
chatbot.response.compte.epargne=Votre compte d'épargne vous permet d'économiser de l'argent. Son solde est affiché dans la carte 'Compte Épargne' sur votre tableau de bord.
chatbot.response.solde=Pour consulter vos soldes, regardez les trois cartes en haut de votre tableau de bord : Solde Total, Compte Courant et Compte Épargne. Cliquez sur 'Actualiser' pour mettre à jour les données.
chatbot.response.virement.interne=Le virement interne permet de transférer de l'argent entre vos propres comptes (courant ↔ épargne). Cliquez sur '🔄 Virement Interne' dans la section 'Effectuer un Virement'. Les transferts sont instantanés.
chatbot.response.virement.tiers=Le virement vers tiers permet d'envoyer de l'argent à un autre client BANKNET. Cliquez sur '💸 Virement vers Tiers' et sélectionnez le destinataire dans le menu déroulant. Vous devez indiquer le montant et un libellé.
chatbot.response.virement=Vous pouvez effectuer deux types de virements : 1) Virement Interne (entre vos comptes) - instantané, 2) Virement vers Tiers (vers un autre client). Accédez-y via la section 'Effectuer un Virement' sur votre tableau de bord.
chatbot.response.comment.virer=Pour effectuer un virement : 1) Choisissez 'Virement Interne' ou 'Virement vers Tiers', 2) Sélectionnez le compte source, 3) Choisissez la destination (pour tiers : client dans le menu), 4) Indiquez le montant et le libellé, 5) Confirmez. Vérifiez que vous avez un solde suffisant !
chatbot.response.graphique=Le graphique 'Évolution des Finances' affiche l'évolution du solde de votre compte courant au fil du temps. Il montre comment votre solde a changé selon vos transactions (virements entrants = augmentation, virements sortants = diminution).
chatbot.response.historique=Votre historique complet de transactions est affiché dans le tableau en bas de votre tableau de bord. Vous y voyez : date, type (CREDIT/DEBIT), montant, libellé, compte source, compte destination, et solde après transaction.
chatbot.response.filtrer=Pour filtrer vos transactions : utilisez la section '🔍 Filtrer l'historique' avec les champs 'Début', 'Fin' (dates), 'Min' et 'Max' (montants en MAD). Cliquez sur '✓ Appliquer' pour activer les filtres, ou '↺ Réinitialiser' pour les effacer.
chatbot.response.exporter=Pour exporter vos transactions en CSV : cliquez sur le bouton '📥 Exporter CSV' dans la section des virements. Choisissez l'emplacement de sauvegarde. Le fichier contiendra toutes vos transactions (filtrées si des filtres sont actifs) avec toutes les informations.
chatbot.response.objectif=Pour créer un objectif d'épargne : cliquez sur '🎯 Objectifs' dans 'Services et Paramètres', puis choisissez 'Ajouter un objectif'. Indiquez le montant cible et le libellé. L'objectif sera lié à votre compte d'épargne et sa progression sera mise à jour automatiquement lors des transferts.
chatbot.response.messagerie=La messagerie sécurisée vous permet de communiquer directement avec la banque. Cliquez sur '💬 Messagerie' dans 'Services et Paramètres' pour envoyer un message, consulter vos conversations et les réponses de nos conseillers.
chatbot.response.notification=Les notifications vous informent de : plafonds dépassés, objectifs atteints, activités suspectes, réponses à vos messages, etc. Cliquez sur l'icône 🔔 en haut à droite de votre tableau de bord pour ouvrir le centre de notifications. Un badge rouge indique le nombre de notifications non lues.
chatbot.response.password=Pour changer votre mot de passe : cliquez sur '🔑 Changer mot de passe' dans 'Services et Paramètres'. Vous devrez saisir votre mot de passe actuel, puis le nouveau mot de passe (deux fois pour confirmation).
chatbot.response.contact=Notre équipe est disponible : Email : BankNetMaroc@gmail.ma | Téléphone : 0522707008 | Messagerie sécurisée : via '💬 Messagerie' dans votre espace client. N'hésitez pas à nous contacter pour toute question !
chatbot.response.merci=Je vous en prie ! N'hésitez pas si vous avez d'autres questions. Je suis là pour vous aider !
chatbot.response.aurevoir=Au revoir ! Bonne journée et n'hésitez pas à revenir si vous avez besoin d'aide. À bientôt sur BANKNET !

