chatbot.welcome=مرحباً ! أنا مساعدك المصرفي في BANKNET. كيف يمكنني مساعدتك اليوم؟
chatbot.default.response=أنا لست متأكداً من فهم سؤالك. يمكنني مساعدتك في: الأرصدة والحسابات، التحويلات، أهداف الادخار، السجل، التصدير، الرسائل، الإشعارات، وغير ذلك. أعد صياغة سؤالك أو اتصل بخدمة العملاء على 0522707008 أو BankNetMaroc@gmail.ma.
chatbot.response.solde.total=إجمالي رصيدك يساوي مجموع جميع حساباتك (جاري + توفير). يتم عرضه في أعلى لوحة التحكم الخاصة بك في بطاقة 'الرصيد الإجمالي'.
chatbot.response.compte.courant=حسابك الجاري هو حسابك الرئيسي للمعاملات اليومية. رصيده مرئي في بطاقة 'الحساب الجاري' على لوحة التحكم الخاصة بك.
chatbot.response.compte.epargne=حساب التوفير الخاص بك يتيح لك توفير المال. يتم عرض رصيده في بطاقة 'حساب التوفير' على لوحة التحكم الخاصة بك.
chatbot.response.solde=للاستعلام عن أرصدتك، انظر إلى البطاقات الثلاث في أعلى لوحة التحكم: الرصيد الإجمالي، الحساب الجاري وحساب التوفير. انقر على 'تحديث' لتحديث البيانات.
chatbot.response.virement.interne=يتيح التحويل الداخلي نقل الأموال بين حساباتك الخاصة (جاري ↔ توفير). انقر على '🔄 تحويل داخلي' في قسم 'تنفيذ تحويل'. التحويلات فورية.
chatbot.response.virement.tiers=يتيح التحويل لطرف ثالث إرسال الأموال إلى عميل آخر في BANKNET. انقر على '💸 تحويل لطرف ثالث' واختر المستلم من القائمة المنسدلة. يجب عليك تحديد المبلغ والوصف.
chatbot.response.virement=يمكنك تنفيذ نوعين من التحويلات: 1) تحويل داخلي (بين حساباتك) - فوري، 2) تحويل لطرف ثالث (إلى عميل آخر). يمكنك الوصول إليها عبر قسم 'تنفيذ تحويل' على لوحة التحكم الخاصة بك.
chatbot.response.comment.virer=لتنفيذ تحويل: 1) اختر 'تحويل داخلي' أو 'تحويل لطرف ثالث'، 2) اختر الحساب المصدر، 3) اختر الوجهة (للطرف الثالث: العميل في القائمة)، 4) حدد المبلغ والوصف، 5) أكد. تحقق من أن لديك رصيد كافٍ!
chatbot.response.graphique=يُظهر الرسم البياني 'تطور المالية' تطور رصيد حسابك الجاري بمرور الوقت. يُظهر كيف تغير رصيدك حسب معاملاتك (التحويلات الواردة = زيادة، التحويلات الصادرة = نقص).
chatbot.response.historique=يتم عرض سجل المعاملات الكامل الخاص بك في الجدول في أسفل لوحة التحكم الخاصة بك. سترى فيه: التاريخ، النوع (ائتمان/خصم)، المبلغ، الوصف، الحساب المصدر، الحساب الوجهة، والرصيد بعد المعاملة.
chatbot.response.filtrer=لتصفية معاملاتك: استخدم قسم '🔍 تصفية السجل' مع الحقول 'بداية'، 'نهاية' (التواريخ)، 'الحد الأدنى' و'الحد الأقصى' (المبالغ بالدرهم). انقر على '✓ تطبيق' لتفعيل المرشحات، أو '↺ إعادة تعيين' لمحوها.
chatbot.response.exporter=لتصدير معاملاتك إلى CSV: انقر على زر '📥 تصدير CSV' في قسم التحويلات. اختر موقع الحفظ. سيحتوي الملف على جميع معاملاتك (المصفاة إذا كانت المرشحات نشطة) مع جميع المعلومات.
chatbot.response.objectif=لإنشاء هدف توفير: انقر على '🎯 الأهداف' في 'الخدمات والإعدادات'، ثم اختر 'إضافة هدف'. حدد المبلغ المستهدف والوصف. سيتم ربط الهدف بحساب التوفير الخاص بك وسيتم تحديث تقدمه تلقائياً عند التحويلات.
chatbot.response.messagerie=تتيح لك الرسائل الآمنة التواصل مباشرة مع البنك. انقر على '💬 الرسائل' في 'الخدمات والإعدادات' لإرسال رسالة، والاطلاع على محادثاتك وردود مستشارينا.
chatbot.response.notification=تخبرك الإشعارات بـ: تجاوز الحدود، تحقيق الأهداف، الأنشطة المشبوهة، ردود على رسائلك، إلخ. انقر على أيقونة 🔔 في أعلى يمين لوحة التحكم الخاصة بك لفتح مركز الإشعارات. تشير علامة حمراء إلى عدد الإشعارات غير المقروءة.
chatbot.response.password=لتغيير كلمة المرور الخاصة بك: انقر على '🔑 تغيير كلمة المرور' في 'الخدمات والإعدادات'. ستحتاج إلى إدخال كلمة المرور الحالية، ثم كلمة المرور الجديدة (مرتين للتأكيد).
chatbot.response.contact=فريقنا متاح: البريد الإلكتروني: BankNetMaroc@gmail.ma | الهاتف: 0522707008 | الرسائل الآمنة: عبر '💬 الرسائل' في مساحة العميل الخاصة بك. لا تتردد في الاتصال بنا لأي سؤال!
chatbot.response.merci=عفواً! لا تتردد إذا كان لديك أسئلة أخرى. أنا هنا لمساعدتك!
chatbot.response.aurevoir=مع السلامة! أتمنى لك يومًا طيباً ولا تتردد في العودة إذا كنت بحاجة إلى مساعدة. أراك قريباً على BANKNET!

