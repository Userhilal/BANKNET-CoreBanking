# Chatbot
chatbot.title=Banking Chatbot
chatbot.send=Send
chatbot.error=Unable to open chatbot
chatbot.welcome=Hello! I am your BANKNET banking assistant. How can I help you today?
chatbot.default.response=I'm not sure I understand your question. I can help you with: balances and accounts, transfers, savings goals, history, export, messaging, notifications, and more. Reformulate your question or contact our customer service at 0522707008 or BankNetMaroc@gmail.ma.
chatbot.response.solde.total=Your total balance corresponds to the sum of all your accounts (current + savings). It is displayed at the top of your dashboard in the 'Total Balance' card.
chatbot.response.compte.courant=Your current account is your main account for daily transactions. Its balance is visible in the 'Current Account' card on your dashboard.
chatbot.response.compte.epargne=Your savings account allows you to save money. Its balance is displayed in the 'Savings Account' card on your dashboard.
chatbot.response.solde=To view your balances, look at the three cards at the top of your dashboard: Total Balance, Current Account and Savings Account. Click 'Refresh' to update the data.
chatbot.response.virement.interne=Internal transfer allows you to transfer money between your own accounts (current ↔ savings). Click on '🔄 Internal Transfer' in the 'Make a Transfer' section. Transfers are instantaneous.
chatbot.response.virement.tiers=Third-party transfer allows you to send money to another BANKNET client. Click on '💸 Third-Party Transfer' and select the recipient from the dropdown menu. You must indicate the amount and a label.
chatbot.response.virement=You can make two types of transfers: 1) Internal Transfer (between your accounts) - instantaneous, 2) Third-Party Transfer (to another client). Access them via the 'Make a Transfer' section on your dashboard.
chatbot.response.comment.virer=To make a transfer: 1) Choose 'Internal Transfer' or 'Third-Party Transfer', 2) Select the source account, 3) Choose the destination (for third-party: client in the menu), 4) Indicate the amount and label, 5) Confirm. Make sure you have sufficient balance!
chatbot.response.graphique=The 'Financial Evolution' chart displays the evolution of your current account balance over time. It shows how your balance has changed according to your transactions (incoming transfers = increase, outgoing transfers = decrease).
chatbot.response.historique=Your complete transaction history is displayed in the table at the bottom of your dashboard. You can see: date, type (CREDIT/DEBIT), amount, label, source account, destination account, and balance after transaction.
chatbot.response.filtrer=To filter your transactions: use the '🔍 Filter History' section with the 'Start', 'End' (dates), 'Min' and 'Max' (amounts in MAD) fields. Click '✓ Apply' to activate the filters, or '↺ Reset' to clear them.
chatbot.response.exporter=To export your transactions to CSV: click the '📥 Export CSV' button in the transfers section. Choose the save location. The file will contain all your transactions (filtered if filters are active) with all the information.
chatbot.response.objectif=To create a savings goal: click on '🎯 Goals' in 'Services and Settings', then choose 'Add a goal'. Indicate the target amount and label. The goal will be linked to your savings account and its progress will be updated automatically during transfers.
chatbot.response.messagerie=Secure messaging allows you to communicate directly with the bank. Click on '💬 Messaging' in 'Services and Settings' to send a message, view your conversations and responses from our advisors.
chatbot.response.notification=Notifications inform you of: exceeded limits, goals achieved, suspicious activities, responses to your messages, etc. Click the 🔔 icon in the top right of your dashboard to open the notification center. A red badge indicates the number of unread notifications.
chatbot.response.password=To change your password: click on '🔑 Change Password' in 'Services and Settings'. You will need to enter your current password, then the new password (twice for confirmation).
chatbot.response.contact=Our team is available: Email: BankNetMaroc@gmail.ma | Phone: 0522707008 | Secure messaging: via '💬 Messaging' in your client area. Don't hesitate to contact us for any questions!
chatbot.response.merci=You're welcome! Don't hesitate if you have other questions. I'm here to help you!
chatbot.response.aurevoir=Goodbye! Have a nice day and don't hesitate to come back if you need help. See you soon on BANKNET!

